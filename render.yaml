services:
  # FastAPI Backend API
  - type: web
    name: autotagging-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false # Set this in Render: your MongoDB Atlas connection string
      - key: JWT_SECRET
        generateValue: true # Generates a random secure secret automatically
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 90
      - key: ALGORITHM
        value: HS256
      - key: OMP_NUM_THREADS
        value: 1
      - key: MKL_NUM_THREADS
        value: 1

  # Vite-React Frontend Static Site
  - type: web
    name: autotagging-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    routes:
      # Support client-side routing (React Router v7) by rewriting all paths to index.html
      - type: rewrite
        source: /*
        destination: /index.html
